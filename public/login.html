<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Lifely — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F6F8F4;color:#282828;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#FFFFFF;border-radius:16px;padding:48px;width:380px;border:1px solid #DDE3D5;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center}
.login-box h1{font-size:24px;margin-bottom:8px}
.login-box h1 span{color:#2C474B}
.login-box p{color:#758068;font-size:14px;margin-bottom:32px}
.input-wrap{position:relative;margin-bottom:16px}
input{width:100%;padding:14px 16px;background:#F6F8F4;border:1px solid #DDE3D5;border-radius:10px;color:#282828;font-size:15px;outline:none;transition:border 0.2s}
input:focus{border-color:#2C474B}
button{width:100%;padding:14px;background:#2C474B;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s}
button:hover{background:#3A5A5E;transform:translateY(-1px)}
.error{color:#C33252;font-size:13px;margin-top:12px;display:none}
.logo{font-size:48px;margin-bottom:16px}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🛏️</div>
  <h1>Little Lifely <span>Demand Planner</span></h1>
  <p>Enter your team password to continue</p>
  <form onsubmit="login(event)">
    <div class="input-wrap"><input type="password" id="pwd" placeholder="Password" autofocus></div>
    <button type="submit">Sign In</button>
  </form>
  <div class="error" id="err">Wrong password. Try again.</div>
</div>
<script>
async function login(e) {
  e.preventDefault();
  const pwd = document.getElementById('pwd').value;
  try {
    const res = await fetch('/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd})
    });
    const data = await res.json();
    if (data.ok) {
      sessionStorage.setItem('session', data.session);
      window.location.href = '/?session=' + data.session;
    } else {
      document.getElementById('err').style.display = 'block';
    }
  } catch(e) { document.getElementById('err').style.display = 'block'; }
}
</script>
</body>
</html>
