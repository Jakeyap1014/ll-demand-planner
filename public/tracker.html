<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifely Shipment Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#F6F8F4;--card:#FFF;--teal:#2C474B;--accent:#3A5A5E;--text:#282828;--dim:#758068;--border:#DDE3D5;--green:#5BAB31;--red:#C33252;--yellow:#D4930D;--blue:#2C474B}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:360px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{background:var(--teal);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.sidebar-header h1{font-size:16px;font-weight:700}
.sidebar-header a{color:#A8C5C8;font-size:12px;text-decoration:none}
.sidebar-header a:hover{color:#fff}
.summary-bar{display:flex;gap:0;border-bottom:1px solid var(--border)}
.summary-item{flex:1;padding:12px;text-align:center;border-right:1px solid var(--border)}
.summary-item:last-child{border-right:none}
.summary-item .num{font-size:20px;font-weight:700}
.summary-item .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px}
.shipment-list{flex:1;overflow-y:auto;padding:8px}
.shipment-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.shipment-card:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.shipment-card.active{border-color:var(--teal);background:#f0f5f5}
.sc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sc-ref{font-weight:700;font-size:13px}
.sc-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.sc-status.production{background:#fff3cd;color:#856404}
.sc-status.in_transit{background:#d4edda;color:#155724}
.sc-status.arrived{background:rgba(44,71,75,0.1);color:var(--teal)}
.sc-status.unknown{background:#f0f0f0;color:#888}
.sc-supplier{font-size:11px;color:var(--dim);margin-bottom:6px}
.sc-route{font-size:11px;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sc-route .arrow{color:var(--dim)}
.sc-meta{display:flex;gap:12px;font-size:11px;color:var(--dim)}
.sc-meta strong{color:var(--text)}
.sc-progress{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.sc-progress-fill{height:100%;border-radius:2px;transition:width 0.3s}
.sc-eta{font-size:12px;font-weight:600;margin-top:6px}
.sc-eta.received{color:var(--green)}
.sc-eta.eta{color:var(--yellow)}
.sc-eta.soon{color:var(--yellow)}
.sc-eta.overdue{color:var(--red)}
.sc-eta.noeta{color:var(--red)}
.map-container{flex:1;position:relative}
#map{width:100%;height:100%}
.popup-content{font-size:12px;line-height:1.6}
.popup-content h3{font-size:14px;margin-bottom:8px;color:var(--teal)}
.popup-content table{font-size:11px;border-collapse:collapse;width:100%;margin-top:8px}
.popup-content td{padding:2px 6px;border-bottom:1px solid #eee}
.popup-content td:first-child{font-weight:600;color:var(--dim);white-space:nowrap}
.back-link{position:absolute;top:12px;left:12px;z-index:1000;background:var(--card);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;color:var(--teal);text-decoration:none;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.back-link:hover{background:var(--teal);color:#fff}
@media(max-width:800px){.sidebar{width:100%;height:40vh;border-right:none;border-bottom:1px solid var(--border)}.map-container{height:60vh}body{flex-direction:column}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>🚢 Shipment Tracker</h1>
    <a href="/">← Demand Planner</a>
  </div>
  <div class="summary-bar" id="summaryBar">
    <div class="summary-item"><div class="num" id="prodUnits">-</div><div class="lbl">Production Units</div></div>
    <div class="summary-item"><div class="num" id="prodValue">-</div><div class="lbl">Production Value</div></div>
    <div class="summary-item"><div class="num" id="transitUnits">-</div><div class="lbl">In Transit Units</div></div>
    <div class="summary-item"><div class="num" id="transitValue">-</div><div class="lbl">In Transit Value</div></div>
  </div>
  <div class="filter-bar" style="display:flex;gap:0;border-bottom:1px solid var(--border)">
    <button class="filter-tab active" onclick="setFilter('active',this)" style="flex:1;padding:10px;border:none;background:var(--teal);color:#fff;cursor:pointer;font-size:12px;font-weight:600">Active</button>
    <button class="filter-tab" onclick="setFilter('in_transit',this)" style="flex:1;padding:10px;border:none;background:var(--card);color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;border-left:1px solid var(--border)">In Transit</button>
    <button class="filter-tab" onclick="setFilter('production',this)" style="flex:1;padding:10px;border:none;background:var(--card);color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;border-left:1px solid var(--border)">Production</button>
    <button class="filter-tab" onclick="setFilter('arrived',this)" style="flex:1;padding:10px;border:none;background:var(--card);color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;border-left:1px solid var(--border)">Arrived</button>
  </div>
  <div class="shipment-list" id="shipmentList">
    <div style="padding:40px;text-align:center;color:var(--dim)">Loading shipments...</div>
  </div>
</div>
<div class="map-container">
  <div id="map"></div>
</div>
<script>
const SESSION=sessionStorage.getItem('session');
if(!SESSION)window.location.href='/login';
const H=()=>({'Content-Type':'application/json','X-Session':SESSION});

// Init map
const map=L.map('map',{center:[20,180],zoom:2,zoomControl:true,attributionControl:false,worldCopyJump:false,maxBounds:[[-85,-30],[85,400]],maxBoundsViscosity:1.0});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18,noWrap:false}).addTo(map);

// Custom icons
function shipIcon(status){
  const colors={in_transit:'#5BAB31',production:'#D4930D',arrived:'#2C474B',unknown:'#999'};
  const color=colors[status]||'#999';
  return L.divIcon({className:'',html:`<div style="font-size:20px;filter:drop-shadow(1px 1px 2px rgba(0,0,0,0.3))">${status==='in_transit'?'🚢':status==='production'?'🏭':'📦'}</div>`,iconSize:[24,24],iconAnchor:[12,12]});
}

function originIcon(){return L.divIcon({className:'',html:'<div style="width:10px;height:10px;background:#D4930D;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',iconSize:[10,10],iconAnchor:[5,5]})}
function destIcon(){return L.divIcon({className:'',html:'<div style="width:12px;height:12px;background:#2C474B;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',iconSize:[12,12],iconAnchor:[6,6]})}

let markers=[];
let shipments=[];
let currentFilter='active';

function setFilter(filter, btn) {
  currentFilter=filter;
  document.querySelectorAll('.filter-tab').forEach(b=>{b.style.background='var(--card)';b.style.color='var(--dim)'});
  btn.style.background='var(--teal)';btn.style.color='#fff';
  renderSidebar();
  renderMap();
}

function getFilteredShipments() {
  if (currentFilter==='active') return shipments.filter(s=>s.shipmentStatus!=='arrived');
  if (currentFilter==='arrived') return shipments.filter(s=>s.shipmentStatus==='arrived');
  return shipments.filter(s=>s.shipmentStatus===currentFilter);
}
let routeLines=[];
let selectedRef=null;

async function loadShipments(){
  try{
    const r=await fetch('/api/shipments',{headers:H()});
    if(r.status===401)return window.location.href='/login';
    const d=await r.json();
    shipments=d.shipments||[];
    renderSidebar();
    renderMap();
  }catch(e){document.getElementById('shipmentList').innerHTML=`<div style="padding:20px;color:#C33252">Error: ${e.message}</div>`}
}

function renderSidebar(){
  const production=shipments.filter(s=>s.shipmentStatus==='production');
  const transit=shipments.filter(s=>s.shipmentStatus==='in_transit');
  const prodUnits=production.reduce((t,s)=>t+s.totalUnits,0);
  const prodVal=production.reduce((t,s)=>t+s.total,0);
  const transitUnits=transit.reduce((t,s)=>t+s.totalUnits,0);
  const transitVal=transit.reduce((t,s)=>t+s.total,0);
  
  document.getElementById('prodUnits').textContent=prodUnits.toLocaleString();
  document.getElementById('prodValue').textContent=prodVal>=1000000?'$'+(prodVal/1000000).toFixed(1)+'M':'$'+Math.round(prodVal/1000)+'K';
  document.getElementById('transitUnits').textContent=transitUnits.toLocaleString();
  document.getElementById('transitValue').textContent=transitVal>=1000000?'$'+(transitVal/1000000).toFixed(1)+'M':'$'+Math.round(transitVal/1000)+'K';
  
  const list=document.getElementById('shipmentList');
  
  const filtered=getFilteredShipments();
  if(filtered.length===0){list.innerHTML='<div style="padding:40px;text-align:center;color:var(--dim)">No shipments in this category</div>';return}
  list.innerHTML=filtered.map(s=>{
    const statusLabel={production:'In Production',in_transit:'In Transit',arrived:'Arrived',unknown:'Unknown'}[s.shipmentStatus]||'Unknown';
    const etaText=s.daysUntil!==null?(s.daysUntil>0?s.daysUntil+' days':'Overdue by '+Math.abs(s.daysUntil)+'d'):'No ETA';
    const etaClass=s.receivedDate?'received':s.daysUntil===null?'noeta':s.daysUntil<0?'overdue':s.daysUntil<=7?'soon':'eta';
    const progressColor=s.shipmentStatus==='in_transit'?'var(--green)':s.shipmentStatus==='production'?'var(--yellow)':'var(--teal)';
    
    return`<div class="shipment-card ${selectedRef===s.reference?'active':''}" onclick="selectShipment('${s.reference}')">
      <div class="sc-header"><span class="sc-ref">${s.reference}</span><span class="sc-status ${s.shipmentStatus}">${statusLabel}</span></div>
      <div class="sc-supplier">${s.supplier.substring(0,40)}</div>
      <div class="sc-route"><span>${s.origin.port||s.origin.city}</span><span class="arrow">→</span><span>${s.destination.port||s.destination.city}</span></div>
      ${s.vesselName?'<div style="font-size:11px;color:var(--dim)">🚢 '+s.vesselName+(s.vesselPosition?' <span style="color:var(--green)">● LIVE</span>':'')+'</div>':''}
      <div class="sc-meta"><span><strong>${s.totalUnits}</strong> units</span><span><strong>${s.skuCount}</strong> SKUs</span><span><strong>${s.total>=1000000?'$'+(s.total/1000000).toFixed(1)+'M':'$'+s.total.toLocaleString()}</strong></span></div>
      <div class="sc-progress"><div class="sc-progress-fill" style="width:${Math.round(s.progress*100)}%;background:${progressColor}"></div></div>
      <div class="sc-eta ${etaClass}">${s.receivedDate?'Received: '+new Date(s.receivedDate).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}):s.eta?'ETA: '+new Date(s.eta).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+' ('+etaText+')':'No ETA set'}</div>
    </div>`
  }).join('');
}

function renderMap(){
  markers.forEach(m=>map.removeLayer(m));
  routeLines.forEach(l=>map.removeLayer(l));
  markers=[];routeLines=[];
  
  // Destination markers (dynamic based on shipments)
  const destinations={};
  const DEST_LABELS={
    'Melbourne':'Melbourne, Australia|Warehouse: Laverton North',
    'Los Angeles':'Los Angeles, USA|West Coast Port',
    'Vancouver':'Vancouver, Canada|West Coast Port',
    'Felixstowe':'Felixstowe, UK|East Coast Port',
    'Auckland':'Auckland, New Zealand',
    'Singapore':'Singapore'
  };
  getFilteredShipments().forEach(s=>{
    const dk=s.destination.lat+','+s.destination.lng;
    if(!destinations[dk]) destinations[dk]=s.destination;
  });
  for(const[key,d]of Object.entries(destinations)){
    const label=(DEST_LABELS[d.city]||d.city).split('|');
    let dLng = d.lng;
    // Trans-Pacific destinations: use >180 coords so marker matches the route
    if(d.lng < -100) dLng = d.lng + 360;
    const destM=L.marker([d.lat, dLng],{icon:destIcon()}).addTo(map);
    destM.bindPopup('<b>'+label[0]+'</b>'+(label[1]?'<br>'+label[1]:''));
    markers.push(destM);
  }
  
  // Group origins to avoid duplicate markers
  const origins={};
  
  getFilteredShipments().forEach(s=>{
    const oKey=s.origin.lat+','+s.origin.lng;
    if(!origins[oKey]){
      origins[oKey]={lat:s.origin.lat,lng:s.origin.lng,city:s.origin.city,port:s.origin.port,count:0};
    }
    origins[oKey].count++;
    
    // Route line
    const routePoints=getRoutePoints(s.origin,s.destination);
    const line=L.polyline(routePoints,{color:s.shipmentStatus==='in_transit'?'#5BAB31':'#DDE3D5',weight:s.shipmentStatus==='in_transit'?2.5:1.5,opacity:s.shipmentStatus==='in_transit'?0.8:0.4,dashArray:s.shipmentStatus==='in_transit'?null:'8 6'}).addTo(map);
    routeLines.push(line);
    
    // Ship marker — use real AIS position if available, else interpolate along route
    if(s.vesselPosition && s.vesselPosition.lat){
      // REAL AIS GPS position
      let aisLng = s.vesselPosition.lng;
      // If trans-Pacific route, adjust longitude for map coords >180
      if(s.destination && s.destination.lng < -100 && aisLng < 0) aisLng += 360;
      const sm=L.marker([s.vesselPosition.lat, aisLng],{icon:shipIcon('in_transit')}).addTo(map);
      const aisAge = s.vesselPosition.timestamp ? 
        Math.round((Date.now()-new Date(s.vesselPosition.timestamp).getTime())/60000) : '?';
      sm.bindPopup(buildPopup(s)+`<br><b>🛰 Live AIS</b><br>Speed: ${s.vesselPosition.speed||0} kn, Heading: ${s.vesselPosition.heading||0}°<br><small>Updated ${aisAge} min ago</small>`);
      markers.push(sm);
    }else if(s.progress>0&&s.progress<1){
      const pos=getPointAlongRoute(routePoints,s.progress);
      const sm=L.marker(pos,{icon:shipIcon(s.shipmentStatus)}).addTo(map);
      sm.bindPopup(buildPopup(s)+'<br><small>📍 Estimated position</small>');
      markers.push(sm);
    }else if(s.shipmentStatus==='production'){
      // Show factory icon at origin
      const fm=L.marker([s.origin.lat+Math.random()*0.5-0.25,s.origin.lng+Math.random()*0.5-0.25],{icon:shipIcon('production')}).addTo(map);
      fm.bindPopup(buildPopup(s));
      markers.push(fm);
    }
  });
  
  // Origin port markers
  for(const[key,o]of Object.entries(origins)){
    const om=L.marker([o.lat,o.lng],{icon:originIcon()}).addTo(map);
    om.bindPopup(`<b>${o.port||o.city}, ${o.city}</b><br>${o.count} shipment(s)`);
    markers.push(om);
  }
}

function getRoutePoints(origin,dest){
  const waypoints = [];
  waypoints.push([origin.lat, origin.lng]);
  
  // Determine route region from destination longitude
  const isTransPacific = dest.lng < -100;   // USA, Canada (West Coast)
  const isUK = dest.lng > -5 && dest.lng < 10 && dest.lat > 45; // UK/Europe
  const isNZ = dest.lat < -30 && dest.lng > 165; // New Zealand
  const isSG = dest.lat > 0 && dest.lat < 3 && dest.lng > 100 && dest.lng < 105; // Singapore
  
  // Step 1: Origin → open water (same for all routes from China/Thailand)
  if (origin.lng < 102) {
    // Thailand (Laem Chabang)
    waypoints.push([10, 102]);
    waypoints.push([5, 103]);
  } else if (origin.lat > 33) {
    // Northern China
    waypoints.push([31, 122]); waypoints.push([25, 119]); waypoints.push([20, 116]);
  } else if (origin.lat > 28) {
    // Central China (Shanghai, Ningbo)
    waypoints.push([25, 120]); waypoints.push([18, 115]);
  } else {
    // Southern China (Shenzhen, Foshan, Dongguan)
    waypoints.push([18, 114]); waypoints.push([10, 109]);
  }
  
  if (isTransPacific) {
    // China → Trans-Pacific → US/Canada West Coast
    // Use lng > 180 to go EAST across Pacific (Leaflet antimeridian fix)
    waypoints.push([18, 120]);              // South China Sea / Philippines
    waypoints.push([22, 130]);              // East of Taiwan
    waypoints.push([30, 145]);              // Open Pacific, east of Japan
    waypoints.push([35, 160]);              // Mid-Pacific
    waypoints.push([38, 175]);              // Mid-Pacific
    waypoints.push([40, 190]);              // Mid-Pacific (past date line = 180+10)
    waypoints.push([40, 205]);              // Mid-Pacific (= -155 + 360)
    waypoints.push([38, 220]);              // Eastern Pacific (= -140 + 360)
    waypoints.push([36, 232]);              // Approaching West Coast (= -128 + 360)
    waypoints.push([dest.lat, dest.lng + 360]); // Destination in >180 coords
  } else if (isUK) {
    // China → Singapore → Indian Ocean → Suez → Med → UK
    waypoints.push([5, 105]);
    waypoints.push([1.2, 104.2]);           // Singapore
    waypoints.push([-1, 100]);              // Indian Ocean
    waypoints.push([0, 75]);                // Central Indian Ocean
    waypoints.push([5, 55]);                // Arabian Sea
    waypoints.push([12, 45]);               // Gulf of Aden
    waypoints.push([13, 43]);               // Bab el-Mandeb
    waypoints.push([27, 34]);               // Red Sea
    waypoints.push([30, 32.5]);             // Suez Canal
    waypoints.push([31.5, 32]);             // Port Said
    waypoints.push([35, 20]);               // Mediterranean
    waypoints.push([36, 5]);                // Western Med
    waypoints.push([37, -5]);               // Strait of Gibraltar
    waypoints.push([43, -8]);               // Bay of Biscay
    waypoints.push([48, -5]);               // English Channel approach
    waypoints.push([50, 0]);                // English Channel
    waypoints.push([dest.lat, dest.lng]);
  } else if (isSG) {
    // China → Singapore (short route)
    waypoints.push([5, 105]);
    waypoints.push([dest.lat, dest.lng]);
  } else if (isNZ) {
    // China → Singapore → Australia → NZ
    waypoints.push([5, 105]);
    waypoints.push([1.2, 104.2]);
    waypoints.push([-1, 106]); waypoints.push([-4, 107]); waypoints.push([-6.5, 106]); waypoints.push([-8, 104]);
    waypoints.push([-12, 100]); waypoints.push([-18, 98]); waypoints.push([-25, 102]);
    waypoints.push([-30, 110]); waypoints.push([-33, 118]); waypoints.push([-35, 126]);
    waypoints.push([-37, 140]); waypoints.push([-38, 150]); waypoints.push([-37, 160]);
    waypoints.push([-36, 170]);
    waypoints.push([dest.lat, dest.lng]);
  } else {
    // Default: Australia route (China → Singapore → Sunda Strait → Indian Ocean → Melbourne)
    waypoints.push([5, 105]);
    waypoints.push([1.2, 104.2]);           // Singapore
    waypoints.push([-1, 106]);              // Java Sea
    waypoints.push([-4, 107]);
    waypoints.push([-6.5, 106]);            // Sunda Strait
    waypoints.push([-8, 104]);              // Exit into Indian Ocean
    waypoints.push([-12, 100]);
    waypoints.push([-18, 98]);
    waypoints.push([-25, 102]);
    waypoints.push([-30, 110]);
    waypoints.push([-33, 118]);             // Off Perth
    waypoints.push([-35, 126]);             // Great Australian Bight
    waypoints.push([-37, 135]);
    waypoints.push([-39, 143]);             // Bass Strait approach
    waypoints.push([-38.3, 144.8]);         // Port Phillip entrance
    waypoints.push([dest.lat, dest.lng]);
  }
  
  // Smooth interpolation
  const points = [];
  for (let i = 0; i < waypoints.length - 1; i++) {
    const [lat1, lng1] = waypoints[i];
    const [lat2, lng2] = waypoints[i + 1];
    const dist = Math.sqrt((lat2-lat1)**2 + (lng2-lng1)**2);
    const segs = Math.max(3, Math.round(dist / 3));
    for (let j = 0; j < segs; j++) {
      const t = j / segs;
      points.push([lat1 + (lat2 - lat1) * t, lng1 + (lng2 - lng1) * t]);
    }
  }
  points.push(waypoints[waypoints.length - 1]);
  
  return points;
}

function getPointAlongRoute(points,progress){
  const idx=Math.floor(progress*(points.length-1));
  const frac=progress*(points.length-1)-idx;
  if(idx>=points.length-1)return points[points.length-1];
  return[points[idx][0]+(points[idx+1][0]-points[idx][0])*frac,points[idx][1]+(points[idx+1][1]-points[idx][1])*frac];
}

function buildPopup(s){
  const items=Object.entries(s.items||{}).slice(0,8).map(([sku,qty])=>`<tr><td>${sku}</td><td>${qty}</td></tr>`).join('');
  const moreItems=Object.keys(s.items||{}).length>8?`<tr><td colspan="2" style="color:var(--dim)">+${Object.keys(s.items).length-8} more...</td></tr>`:'';
  return`<div class="popup-content">
    <h3>${s.reference}</h3>
    <table>
      <tr><td>Supplier</td><td>${s.supplier.substring(0,35)}</td></tr>
      <tr><td>From</td><td>${s.origin.port||s.origin.city}, ${s.origin.country}</td></tr>
      <tr><td>To</td><td>${s.destination.port||s.destination.city}</td></tr>
      ${s.vesselName?'<tr><td>Vessel</td><td>🚢 '+s.vesselName+'</td></tr>':''}
      ${s.receivedDate?'<tr><td>Received</td><td>'+new Date(s.receivedDate).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+'</td></tr>':''}
      ${s.eta?'<tr><td>ETA</td><td>'+new Date(s.eta).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+(s.daysUntil!==null?' ('+s.daysUntil+'d)':'')+'</td></tr>':''}
      <tr><td>Units</td><td>${s.totalUnits} across ${s.skuCount} SKUs</td></tr>
      <tr><td>Value</td><td>$${s.total.toLocaleString()} ${s.currency}</td></tr>
    </table>
    ${items?'<table style="margin-top:8px"><tr><td><b>SKU</b></td><td><b>Qty</b></td></tr>'+items+moreItems+'</table>':''}
  </div>`;
}

function selectShipment(ref){
  selectedRef=ref===selectedRef?null:ref;
  renderSidebar();
  const s=shipments.find(x=>x.reference===ref);
  if(s){
    let pos;
    if(s.vesselPosition && s.vesselPosition.lat){
      let aisLng=s.vesselPosition.lng;
      if(s.destination&&s.destination.lng<-100&&aisLng<0) aisLng+=360;
      pos=[s.vesselPosition.lat,aisLng];
    }else{
      const routePoints=getRoutePoints(s.origin,s.destination);
      pos=s.progress>0&&s.progress<1?getPointAlongRoute(routePoints,s.progress):[s.origin.lat,s.origin.lng];
    }
    map.flyTo(pos,5,{duration:1});
    // Open popup
    markers.forEach(m=>{
      if(m.getPopup&&m.getPopup()&&m.getPopup().getContent().includes(ref)){m.openPopup()}
    });
  }
}

loadShipments();
// Refresh every 5 min
setInterval(loadShipments,5*60*1000);
</script>
</body>
