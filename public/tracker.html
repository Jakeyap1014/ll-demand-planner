<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifely Shipment Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#F6F8F4;--card:#FFF;--teal:#2C474B;--accent:#3A5A5E;--text:#282828;--dim:#758068;--border:#DDE3D5;--green:#5BAB31;--red:#C33252;--yellow:#D4930D;--blue:#2C474B}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:360px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{background:var(--teal);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.sidebar-header h1{font-size:16px;font-weight:700}
.sidebar-header a{color:#A8C5C8;font-size:12px;text-decoration:none}
.sidebar-header a:hover{color:#fff}
.summary-bar{display:flex;gap:0;border-bottom:1px solid var(--border)}
.summary-item{flex:1;padding:12px;text-align:center;border-right:1px solid var(--border)}
.summary-item:last-child{border-right:none}
.summary-item .num{font-size:20px;font-weight:700}
.summary-item .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px}
.shipment-list{flex:1;overflow-y:auto;padding:8px}
.shipment-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.shipment-card:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.shipment-card.active{border-color:var(--teal);background:#f0f5f5}
.sc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sc-ref{font-weight:700;font-size:13px}
.sc-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.sc-status.production{background:#fff3cd;color:#856404}
.sc-status.in_transit{background:#d4edda;color:#155724}
.sc-status.arrived{background:rgba(44,71,75,0.1);color:var(--teal)}
.sc-status.unknown{background:#f0f0f0;color:#888}
.sc-supplier{font-size:11px;color:var(--dim);margin-bottom:6px}
.sc-route{font-size:11px;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sc-route .arrow{color:var(--dim)}
.sc-meta{display:flex;gap:12px;font-size:11px;color:var(--dim)}
.sc-meta strong{color:var(--text)}
.sc-progress{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.sc-progress-fill{height:100%;border-radius:2px;transition:width 0.3s}
.sc-eta{font-size:12px;font-weight:600;margin-top:6px}
.sc-eta.received{color:var(--green)}
.sc-eta.eta{color:var(--yellow)}
.sc-eta.soon{color:var(--yellow)}
.sc-eta.overdue{color:var(--red)}
.sc-eta.noeta{color:var(--red)}
.map-container{flex:1;position:relative}
#map{width:100%;height:100%}
.popup-content{font-size:12px;line-height:1.6;max-height:60vh;overflow-y:auto}
.popup-content h3{font-size:14px;margin-bottom:8px;color:var(--teal);position:sticky;top:0;background:#fff;padding-bottom:4px}
.popup-content table{font-size:11px;border-collapse:collapse;width:100%;margin-top:8px}
.popup-content td{padding:2px 6px;border-bottom:1px solid #eee}
.popup-content td:first-child{font-weight:600;color:var(--dim);white-space:nowrap}
.leaflet-popup-content{max-height:70vh;overflow:visible}
/* Detail side panel */
#detailPanel{position:absolute;top:12px;right:16px;z-index:1001;width:320px;max-height:calc(100vh - 24px);background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);overflow-y:auto;display:none;border:1px solid var(--border)}
#detailPanel .dp-header{position:sticky;top:0;background:var(--teal);color:#fff;padding:12px 16px;border-radius:10px 10px 0 0;display:flex;justify-content:space-between;align-items:center}
#detailPanel .dp-header h3{font-size:14px;margin:0}
#detailPanel .dp-close{background:none;border:none;color:#A8C5C8;font-size:18px;cursor:pointer;padding:0 4px}
#detailPanel .dp-close:hover{color:#fff}
#detailPanel .dp-body{padding:14px 16px}
#detailPanel .dp-body table{font-size:12px;border-collapse:collapse;width:100%}
#detailPanel .dp-body td{padding:4px 6px;border-bottom:1px solid #f0f0f0}
#detailPanel .dp-body td:first-child{font-weight:600;color:var(--dim);white-space:nowrap;width:90px}
#detailPanel .dp-sku-table{margin-top:12px}
#detailPanel .dp-sku-table th{text-align:left;font-size:11px;color:var(--dim);padding:4px 6px;border-bottom:2px solid var(--border)}
#detailPanel .dp-sku-table td{font-size:11px;padding:3px 6px;border-bottom:1px solid #f5f5f5}
/* Notifications */
#notifBell{position:absolute;top:12px;right:348px;z-index:1001;background:#fff;border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
#notifBell:hover{background:var(--bg)}
#notifBadge{position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:50%;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 4px}
#notifPanel{position:absolute;top:58px;right:348px;z-index:1002;width:320px;max-height:60vh;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);overflow-y:auto;display:none}
#notifPanel .np-header{position:sticky;top:0;background:#fff;padding:12px 16px;border-bottom:1px solid var(--border);font-weight:700;font-size:13px}
.notif-item{padding:10px 16px;border-bottom:1px solid #f5f5f5;font-size:12px;cursor:pointer}
.notif-item:hover{background:var(--bg)}
.notif-item .ni-icon{display:inline-block;margin-right:6px}
.notif-item .ni-time{font-size:10px;color:var(--dim);margin-top:2px}
.notif-item.delay{border-left:3px solid var(--red)}
.notif-item.early{border-left:3px solid var(--green)}
.notif-item.arriving{border-left:3px solid var(--yellow)}
.back-link{position:absolute;top:12px;left:12px;z-index:1000;background:var(--card);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;color:var(--teal);text-decoration:none;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.back-link:hover{background:var(--teal);color:#fff}
@media(max-width:800px){.sidebar{width:100%;height:40vh;border-right:none;border-bottom:1px solid var(--border)}.map-container{height:60vh}body{flex-direction:column}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1>🚢 Shipment Tracker</h1>
    <a href="/" id="backToDashboard">← Demand Planner</a>
  </div>
  <div class="summary-bar" id="summaryBar">
    <div class="summary-item"><div class="num" id="prodUnits">-</div><div class="lbl">Production Units</div></div>
    <div class="summary-item"><div class="num" id="prodValue">-</div><div class="lbl">Production Value</div></div>
    <div class="summary-item"><div class="num" id="transitUnits">-</div><div class="lbl">In Transit Units</div></div>
    <div class="summary-item"><div class="num" id="transitValue">-</div><div class="lbl">In Transit Value</div></div>
  </div>
  <div class="filter-bar" style="display:flex;gap:0;border-bottom:1px solid var(--border)">
    <button class="filter-tab active" id="tab-active" onclick="setFilter('active',this)" style="flex:1;padding:10px;border:none;background:var(--teal);color:#fff;cursor:pointer;font-size:12px;font-weight:600">Active <span id="cnt-active"></span></button>
    <button class="filter-tab" id="tab-in_transit" onclick="setFilter('in_transit',this)" style="flex:1;padding:10px;border:none;background:var(--card);color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;border-left:1px solid var(--border)">In Transit <span id="cnt-in_transit"></span></button>
    <button class="filter-tab" id="tab-production" onclick="setFilter('production',this)" style="flex:1;padding:10px;border:none;background:var(--card);color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;border-left:1px solid var(--border)">Production <span id="cnt-production"></span></button>
    <button class="filter-tab" id="tab-arrived" onclick="setFilter('arrived',this)" style="flex:1;padding:10px;border:none;background:var(--card);color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;border-left:1px solid var(--border)">Arrived <span id="cnt-arrived"></span></button>
  </div>
  <div style="display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg)">
    <select id="filterCountry" onchange="applyFilters()" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:var(--card);color:var(--text)">
      <option value="">All Destinations</option>
    </select>
    <input id="filterSKU" type="text" placeholder="Search SKU..." oninput="applyFilters()" style="flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:var(--card);color:var(--text)">
  </div>
  <div class="shipment-list" id="shipmentList">
    <div style="padding:40px;text-align:center;color:var(--dim)">Loading shipments...</div>
  </div>
</div>
<div class="map-container">
  <div id="map"></div>
  <!-- Detail side panel -->
  <div id="detailPanel">
    <div class="dp-header"><h3 id="dpTitle">-</h3><button class="dp-close" onclick="closeDetail()">✕</button></div>
    <div class="dp-body" id="dpBody"></div>
  </div>
  <!-- Notifications -->
  <div id="notifBell" onclick="toggleNotifs()">🔔<span id="notifBadge" style="display:none">0</span></div>
  <div id="notifPanel"><div class="np-header">Notifications</div><div id="notifList"></div></div>
  <div id="map-legend" style="position:absolute;bottom:24px;right:16px;z-index:1000;background:rgba(255,255,255,0.92);border-radius:8px;padding:10px 14px;font-size:11px;line-height:20px;box-shadow:0 1px 4px rgba(0,0,0,0.15)">
    <div style="font-weight:600;margin-bottom:4px">Routes</div>
    <div><span style="display:inline-block;width:18px;height:3px;background:#5BAB31;border-radius:2px;vertical-align:middle;margin-right:6px"></span>Australia</div>
    <div><span style="display:inline-block;width:18px;height:3px;background:#3B82F6;border-radius:2px;vertical-align:middle;margin-right:6px"></span>USA</div>
    <div><span style="display:inline-block;width:18px;height:3px;background:#8B5CF6;border-radius:2px;vertical-align:middle;margin-right:6px"></span>Canada</div>
    <div><span style="display:inline-block;width:18px;height:3px;background:#F59E0B;border-radius:2px;vertical-align:middle;margin-right:6px"></span>UK</div>
    <div><span style="display:inline-block;width:18px;height:3px;background:#06B6D4;border-radius:2px;vertical-align:middle;margin-right:6px"></span>NZ</div>
    <div><span style="display:inline-block;width:18px;height:3px;background:#EF4444;border-radius:2px;vertical-align:middle;margin-right:6px"></span>Singapore</div>
    <div style="margin-top:4px;border-top:1px solid #eee;padding-top:4px"><span style="display:inline-block;width:18px;height:3px;background:#DDE3D5;border-radius:2px;vertical-align:middle;margin-right:6px;border:1px dashed #bbb"></span>Not yet departed</div>
  </div>
</div>
<script>
const SESSION=new URLSearchParams(window.location.search).get('session')||sessionStorage.getItem('session');
if(!SESSION)window.location.href='/login';
sessionStorage.setItem('session',SESSION);
if(window.location.search)history.replaceState({},'','/tracker');
const H=()=>({'Content-Type':'application/json','X-Session':SESSION});
// Back link needs session as query param since GET / requires auth
document.getElementById('backToDashboard').href='/?session='+encodeURIComponent(SESSION);

// Init map
const map=L.map('map',{center:[20,180],zoom:2,zoomControl:true,attributionControl:false,worldCopyJump:false,maxBounds:[[-85,-30],[85,400]],maxBoundsViscosity:1.0});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18,noWrap:false}).addTo(map);

// Custom icons
function shipIcon(status){
  const colors={in_transit:'#5BAB31',production:'#D4930D',arrived:'#2C474B',unknown:'#999'};
const cleanPoRef=ref=>(ref||'').replace(/-cover$/i,'');
  const color=colors[status]||'#999';
  return L.divIcon({className:'',html:`<div style="font-size:20px;filter:drop-shadow(1px 1px 2px rgba(0,0,0,0.3))">${status==='in_transit'?'🚢':status==='production'?'🏭':'📦'}</div>`,iconSize:[24,24],iconAnchor:[12,12]});
}

function originIcon(){return L.divIcon({className:'',html:'<div style="width:10px;height:10px;background:#D4930D;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',iconSize:[10,10],iconAnchor:[5,5]})}
function destIcon(){return L.divIcon({className:'',html:'<div style="width:12px;height:12px;background:#2C474B;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>',iconSize:[12,12],iconAnchor:[6,6]})}
const POPUP_OPTS={maxWidth:280,minWidth:220,offset:L.point(0,8)};

let markers=[];
let shipments=[];
let currentFilter='active';
let filterCountry='';
let filterSKU='';

function setFilter(filter, btn) {
  currentFilter=filter;
  document.querySelectorAll('.filter-tab').forEach(b=>{b.style.background='var(--card)';b.style.color='var(--dim)'});
  btn.style.background='var(--teal)';btn.style.color='#fff';
  renderSidebar();
  renderMap();
}

function applyFilters(){
  filterCountry=document.getElementById('filterCountry').value;
  filterSKU=document.getElementById('filterSKU').value.toUpperCase().trim();
  updateTabCounts();
  renderSidebar();
  renderMap();
}

function populateCountryFilter(){
  const countries=new Set();
  shipments.forEach(s=>{const c=s.destination?.city||s.destination?.port||'Unknown';countries.add(c)});
  const sel=document.getElementById('filterCountry');
  const prev=sel.value;
  sel.innerHTML='<option value="">All Destinations</option>';
  Array.from(countries).sort().forEach(c=>{sel.innerHTML+=`<option value="${c}">${c}</option>`});
  sel.value=prev;
}

function matchesSubFilters(s){
  if(filterCountry && (s.destination?.city||s.destination?.port||'')!==filterCountry) return false;
  if(filterSKU){
    const skus=Object.keys(s.items||{}).join(' ').toUpperCase();
    if(!skus.includes(filterSKU)) return false;
  }
  return true;
}

function getFilteredShipments() {
  let list;
  if (currentFilter==='active') list=shipments.filter(s=>s.shipmentStatus!=='arrived');
  else if (currentFilter==='arrived') list=shipments.filter(s=>s.shipmentStatus==='arrived');
  else list=shipments.filter(s=>s.shipmentStatus===currentFilter);
  return list.filter(matchesSubFilters);
}
let routeLines=[];
let selectedRef=null;

async function loadShipments(){
  try{
    const r=await fetch('/api/shipments',{headers:H()});
    if(r.status===401)return window.location.href='/login';
    const d=await r.json();
    shipments=d.shipments||[];
    populateCountryFilter();
    updateTabCounts();
    generateNotifications();
    renderSidebar();
    renderMap();
  }catch(e){document.getElementById('shipmentList').innerHTML=`<div style="padding:20px;color:#C33252">Error: ${e.message}</div>`}
}

function updateTabCounts(){
  const f=s=>matchesSubFilters(s);
  const active=shipments.filter(s=>s.shipmentStatus!=='arrived'&&f(s)).length;
  const transit=shipments.filter(s=>s.shipmentStatus==='in_transit'&&f(s)).length;
  const prod=shipments.filter(s=>s.shipmentStatus==='production'&&f(s)).length;
  const arrived=shipments.filter(s=>s.shipmentStatus==='arrived'&&f(s)).length;
  document.getElementById('cnt-active').textContent='('+active+')';
  document.getElementById('cnt-in_transit').textContent='('+transit+')';
  document.getElementById('cnt-production').textContent='('+prod+')';
  document.getElementById('cnt-arrived').textContent='('+arrived+')';
}

function renderSidebar(){
  const production=shipments.filter(s=>s.shipmentStatus==='production');
  const transit=shipments.filter(s=>s.shipmentStatus==='in_transit');
  const prodUnits=production.reduce((t,s)=>t+s.totalUnits,0);
  const prodVal=production.reduce((t,s)=>t+s.total,0);
  const transitUnits=transit.reduce((t,s)=>t+s.totalUnits,0);
  const transitVal=transit.reduce((t,s)=>t+s.total,0);
  
  document.getElementById('prodUnits').textContent=prodUnits.toLocaleString();
  document.getElementById('prodValue').textContent=prodVal>=1000000?'$'+(prodVal/1000000).toFixed(1)+'M':'$'+Math.round(prodVal/1000)+'K';
  document.getElementById('transitUnits').textContent=transitUnits.toLocaleString();
  document.getElementById('transitValue').textContent=transitVal>=1000000?'$'+(transitVal/1000000).toFixed(1)+'M':'$'+Math.round(transitVal/1000)+'K';
  
  const list=document.getElementById('shipmentList');
  
  const filtered=getFilteredShipments();
  if(filtered.length===0){list.innerHTML='<div style="padding:40px;text-align:center;color:var(--dim)">No shipments in this category</div>';return}
  list.innerHTML=filtered.map(s=>{
    const statusLabel={production:'In Production',in_transit:'In Transit',arrived:'Arrived',unknown:'Unknown'}[s.shipmentStatus]||'Unknown';
    const etaText=s.shipmentStatus==='arrived'?'Received':s.daysUntil!==null?(s.daysUntil>0?s.daysUntil+' days':'Overdue by '+Math.abs(s.daysUntil)+'d'):'No ETA';
    const etaClass=s.shipmentStatus==='arrived'?'received':s.etaStatus==='delayed'?'overdue':s.etaStatus==='early'?'received':s.receivedDate?'received':s.daysUntil===null?'noeta':s.daysUntil<0?'overdue':s.daysUntil<=7?'soon':'eta';
    const etaTag=s.etaStatus==='delayed'?' <span style="font-size:10px;color:var(--red);font-weight:700">⚠ DELAYED</span>':s.etaStatus==='early'?' <span style="font-size:10px;color:var(--green);font-weight:700">✓ EARLY</span>':'';
    const progressColor=s.shipmentStatus==='in_transit'?'var(--green)':s.shipmentStatus==='production'?'var(--yellow)':'var(--teal)';
    
    return`<div class="shipment-card ${selectedRef===s.reference?'active':''}" onclick="selectShipment('${s.reference}')">
      <div class="sc-header"><span class="sc-ref">${cleanPoRef(s.reference)}</span><span class="sc-status ${s.shipmentStatus}">${statusLabel}</span></div>
      <div class="sc-supplier">${s.supplier.substring(0,40)}</div>
      <div class="sc-route"><span>${s.origin.port||s.origin.city}</span><span class="arrow">→</span><span>${s.destination.port||s.destination.city}</span></div>
      ${s.vesselName?'<div style="font-size:11px;color:var(--dim)">🚢 '+s.vesselName+(s.vesselPosition?' <span style="color:var(--green)">● LIVE</span>':'')+'</div>':''}
      <div class="sc-meta"><span><strong>${s.totalUnits}</strong> units</span><span><strong>${s.skuCount}</strong> SKUs</span><span><strong>${s.total>=1000000?'$'+(s.total/1000000).toFixed(1)+'M':'$'+s.total.toLocaleString()}</strong></span></div>
      <div class="sc-progress"><div class="sc-progress-fill" style="width:${Math.round(s.progress*100)}%;background:${progressColor}"></div></div>
      <div class="sc-eta ${etaClass}">${s.shipmentStatus==='arrived'?(s.receivedDate?'Received: '+new Date(s.receivedDate).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}):'Received'):(s.eta?'ETA: '+new Date(s.eta).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+' ('+etaText+')':'No ETA set')}</div>
    </div>`
  }).join('');
}

function renderMap(){
  markers.forEach(m=>map.removeLayer(m));
  routeLines.forEach(l=>map.removeLayer(l));
  markers=[];routeLines=[];
  
  // Destination markers (dynamic based on shipments)
  const destinations={};
  const DEST_LABELS={
    'Melbourne':'Melbourne, Australia|Warehouse: Laverton North',
    'Los Angeles':'Los Angeles, USA|West Coast Port',
    'Vancouver':'Vancouver, Canada|West Coast Port',
    'Felixstowe':'Felixstowe, UK|East Coast Port',
    'Auckland':'Auckland, New Zealand',
    'Singapore':'Singapore'
  };
  getFilteredShipments().forEach(s=>{
    const dk=s.destination.lat+','+s.destination.lng;
    if(!destinations[dk]) destinations[dk]=s.destination;
  });
  for(const[key,d]of Object.entries(destinations)){
    const label=(DEST_LABELS[d.city]||d.city).split('|');
    let dLng = d.lng;
    // Trans-Pacific destinations: use >180 coords so marker matches the route
    if(d.lng < -100) dLng = d.lng + 360;
    const destM=L.marker([d.lat, dLng],{icon:destIcon()}).addTo(map);
    destM.bindPopup('<b>'+label[0]+'</b>'+(label[1]?'<br>'+label[1]:''));
    markers.push(destM);
  }
  
  // Group origins to avoid duplicate markers
  const origins={};
  
  getFilteredShipments().forEach(s=>{
    const oKey=s.origin.lat+','+s.origin.lng;
    if(!origins[oKey]){
      origins[oKey]={lat:s.origin.lat,lng:s.origin.lng,city:s.origin.city,port:s.origin.port,count:0};
    }
    origins[oKey].count++;
    
    // Route line
    const routePoints=getRoutePoints(s.origin,s.destination);
    // Route color by destination
    const ROUTE_COLORS={
      'Melbourne':'#5BAB31',    // 🟢 Green — Australia
      'Los Angeles':'#3B82F6',  // 🔵 Blue — USA
      'Vancouver':'#8B5CF6',    // 🟣 Purple — Canada
      'Felixstowe':'#F59E0B',   // 🟡 Amber — UK
      'Auckland':'#06B6D4',     // 🔵 Cyan — NZ
      'Singapore':'#EF4444'     // 🔴 Red — Singapore
    };
    const destCity=s.destination.city||s.destination.port||'Melbourne';
    let routeColor=ROUTE_COLORS[destCity]||'#5BAB31';
    // Override color for delayed (red) or early (green) shipments
    if(s.etaStatus==='delayed') routeColor='#C33252';
    else if(s.etaStatus==='early') routeColor='#5BAB31';
    const isActive=s.shipmentStatus==='in_transit';
    const line=L.polyline(routePoints,{color:isActive?routeColor:'#DDE3D5',weight:isActive?(s.etaStatus==='delayed'?3.5:2.5):1.5,opacity:isActive?0.8:0.4,dashArray:isActive?null:'8 6'}).addTo(map);
    routeLines.push(line);
    
    // Ship marker — use real AIS position if available, else interpolate along route
    if(s.vesselPosition && s.vesselPosition.lat){
      // REAL AIS GPS position
      let aisLng = s.vesselPosition.lng;
      // If trans-Pacific route, adjust longitude for map coords >180
      if(s.destination && s.destination.lng < -100 && aisLng < 0) aisLng += 360;
      const sm=L.marker([s.vesselPosition.lat, aisLng],{icon:shipIcon('in_transit')}).addTo(map);
      const aisAge = s.vesselPosition.timestamp ? 
        Math.round((Date.now()-new Date(s.vesselPosition.timestamp).getTime())/60000) : '?';
      sm.bindPopup(buildPopup(s)+`<br><b>🛰 Live AIS</b><br>Speed: ${s.vesselPosition.speed||0} kn, Heading: ${s.vesselPosition.heading||0}°<br><small>Updated ${aisAge} min ago</small>`,POPUP_OPTS);
      markers.push(sm);
    }else if(s.progress>0&&s.progress<1){
      const pos=getPointAlongRoute(routePoints,s.progress);
      const sm=L.marker(pos,{icon:shipIcon(s.shipmentStatus)}).addTo(map);
      sm.bindPopup(buildPopup(s)+'<br><small>📍 Estimated position</small>',POPUP_OPTS);
      markers.push(sm);
    }else if(s.shipmentStatus==='arrived'){
      // Show arrived marker at destination
      let dLng=s.destination.lng;
      if(dLng<-100) dLng+=360;
      const am=L.marker([s.destination.lat+Math.random()*0.3-0.15, dLng+Math.random()*0.3-0.15],{icon:shipIcon('arrived')}).addTo(map);
      am.bindPopup(buildPopup(s),POPUP_OPTS);
      markers.push(am);
    }else if(s.shipmentStatus==='production'){
      // Show factory icon at origin
      const fm=L.marker([s.origin.lat+Math.random()*0.5-0.25,s.origin.lng+Math.random()*0.5-0.25],{icon:shipIcon('production')}).addTo(map);
      fm.bindPopup(buildPopup(s),POPUP_OPTS);
      markers.push(fm);
    }
  });
  
  // Origin port markers
  for(const[key,o]of Object.entries(origins)){
    const om=L.marker([o.lat,o.lng],{icon:originIcon()}).addTo(map);
    om.bindPopup(`<b>${o.port||o.city}, ${o.city}</b><br>${o.count} shipment(s)`);
    markers.push(om);
  }
}

function getRoutePoints(origin,dest){
  const waypoints = [];
  waypoints.push([origin.lat, origin.lng]);
  
  // Determine route region from destination longitude
  const isTransPacific = dest.lng < -100;   // USA, Canada (West Coast)
  const isUK = dest.lng > -5 && dest.lng < 10 && dest.lat > 45; // UK/Europe
  const isNZ = dest.lat < -30 && dest.lng > 165; // New Zealand
  const isSG = dest.lat > 0 && dest.lat < 3 && dest.lng > 100 && dest.lng < 105; // Singapore
  
  // Step 1: Origin → open water (same for all routes from China/Thailand)
  if (origin.lng < 102) {
    // Thailand (Laem Chabang)
    waypoints.push([10, 102]);
    waypoints.push([5, 103]);
  } else if (origin.lat > 33) {
    // Northern China
    waypoints.push([31, 122]); waypoints.push([25, 119]); waypoints.push([20, 116]);
  } else if (origin.lat > 28) {
    // Central China (Shanghai, Ningbo)
    waypoints.push([25, 120]); waypoints.push([18, 115]);
  } else {
    // Southern China (Shenzhen, Foshan, Dongguan)
    waypoints.push([18, 114]); waypoints.push([10, 109]);
  }
  
  if (isTransPacific) {
    // China → Trans-Pacific → US/Canada West Coast
    // Use lng > 180 to go EAST across Pacific (Leaflet antimeridian fix)
    waypoints.push([18, 120]);              // South China Sea / Philippines
    waypoints.push([22, 130]);              // East of Taiwan
    waypoints.push([30, 145]);              // Open Pacific, east of Japan
    waypoints.push([35, 160]);              // Mid-Pacific
    waypoints.push([38, 175]);              // Mid-Pacific
    waypoints.push([40, 190]);              // Mid-Pacific (past date line = 180+10)
    waypoints.push([40, 205]);              // Mid-Pacific (= -155 + 360)
    waypoints.push([38, 220]);              // Eastern Pacific (= -140 + 360)
    waypoints.push([36, 232]);              // Approaching West Coast (= -128 + 360)
    waypoints.push([dest.lat, dest.lng + 360]); // Destination in >180 coords
  } else if (isUK) {
    // China → Singapore → Indian Ocean → Suez → Med → UK
    waypoints.push([5, 105]);
    waypoints.push([1.2, 104.2]);           // Singapore
    waypoints.push([-1, 100]);              // Indian Ocean
    waypoints.push([0, 75]);                // Central Indian Ocean
    waypoints.push([5, 55]);                // Arabian Sea
    waypoints.push([12, 45]);               // Gulf of Aden
    waypoints.push([13, 43]);               // Bab el-Mandeb
    waypoints.push([27, 34]);               // Red Sea
    waypoints.push([30, 32.5]);             // Suez Canal
    waypoints.push([31.5, 32]);             // Port Said
    waypoints.push([35, 20]);               // Mediterranean
    waypoints.push([36, 5]);                // Western Med
    waypoints.push([37, -5]);               // Strait of Gibraltar
    waypoints.push([43, -8]);               // Bay of Biscay
    waypoints.push([48, -5]);               // English Channel approach
    waypoints.push([50, 0]);                // English Channel
    waypoints.push([dest.lat, dest.lng]);
  } else if (isSG) {
    // China → Singapore (short route)
    waypoints.push([5, 105]);
    waypoints.push([dest.lat, dest.lng]);
  } else if (isNZ) {
    // China → Singapore → Australia → NZ
    waypoints.push([5, 105]);
    waypoints.push([1.2, 104.2]);
    waypoints.push([-1, 106]); waypoints.push([-4, 107]); waypoints.push([-6.5, 106]); waypoints.push([-8, 104]);
    waypoints.push([-12, 100]); waypoints.push([-18, 98]); waypoints.push([-25, 102]);
    waypoints.push([-30, 110]); waypoints.push([-33, 118]); waypoints.push([-35, 126]);
    waypoints.push([-37, 140]); waypoints.push([-38, 150]); waypoints.push([-37, 160]);
    waypoints.push([-36, 170]);
    waypoints.push([dest.lat, dest.lng]);
  } else {
    // Default: Australia route (China → Singapore → Sunda Strait → Indian Ocean → Melbourne)
    waypoints.push([5, 105]);
    waypoints.push([1.2, 104.2]);           // Singapore
    waypoints.push([-1, 106]);              // Java Sea
    waypoints.push([-4, 107]);
    waypoints.push([-6.5, 106]);            // Sunda Strait
    waypoints.push([-8, 104]);              // Exit into Indian Ocean
    waypoints.push([-12, 100]);
    waypoints.push([-18, 98]);
    waypoints.push([-25, 102]);
    waypoints.push([-30, 110]);
    waypoints.push([-33, 118]);             // Off Perth
    waypoints.push([-35, 126]);             // Great Australian Bight
    waypoints.push([-37, 135]);
    waypoints.push([-39, 143]);             // Bass Strait approach
    waypoints.push([-38.3, 144.8]);         // Port Phillip entrance
    waypoints.push([dest.lat, dest.lng]);
  }
  
  // Smooth interpolation
  const points = [];
  for (let i = 0; i < waypoints.length - 1; i++) {
    const [lat1, lng1] = waypoints[i];
    const [lat2, lng2] = waypoints[i + 1];
    const dist = Math.sqrt((lat2-lat1)**2 + (lng2-lng1)**2);
    const segs = Math.max(3, Math.round(dist / 3));
    for (let j = 0; j < segs; j++) {
      const t = j / segs;
      points.push([lat1 + (lat2 - lat1) * t, lng1 + (lng2 - lng1) * t]);
    }
  }
  points.push(waypoints[waypoints.length - 1]);
  
  return points;
}

function getPointAlongRoute(points,progress){
  const idx=Math.floor(progress*(points.length-1));
  const frac=progress*(points.length-1)-idx;
  if(idx>=points.length-1)return points[points.length-1];
  return[points[idx][0]+(points[idx+1][0]-points[idx][0])*frac,points[idx][1]+(points[idx+1][1]-points[idx][1])*frac];
}

function buildPopup(s){
  return`<div style="font-size:12px"><b>${cleanPoRef(s.reference)}</b><br>${s.origin.port||s.origin.city} → ${s.destination.port||s.destination.city}<br>${s.totalUnits} units</div>`;
}

function showDetail(s){
  const allItems=Object.entries(s.items||{}).sort((a,b)=>b[1]-a[1]);
  const skuRows=allItems.map(([sku,qty])=>`<tr><td>${sku}</td><td style="text-align:right">${qty}</td></tr>`).join('');
  const statusLabel={production:'🏭 In Production',in_transit:'🚢 In Transit',arrived:'📦 Arrived'}[s.shipmentStatus]||'Unknown';
  const etaDisplay=s.shipmentStatus==='arrived'?(s.receivedDate?'✅ Received '+new Date(s.receivedDate).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}):'✅ Received'):(s.eta?new Date(s.eta).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})+(s.daysUntil!==null&&s.daysUntil>0?' ('+s.daysUntil+' days)':'')+(s.etaStatus==='delayed'?' <span style="color:var(--red);font-weight:700">⚠ DELAYED</span>':s.etaStatus==='early'?' <span style="color:var(--green);font-weight:700">✓ EARLY</span>':''):'Not set');
  const origEtaDisplay=s.originalEta?new Date(s.originalEta).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}):null;
  const etdDisplay=s.etd?new Date(s.etd).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}):'Not set';

  document.getElementById('dpTitle').textContent=cleanPoRef(s.reference);
  document.getElementById('dpBody').innerHTML=`
    <div style="margin-bottom:12px"><span style="font-size:11px;padding:3px 10px;border-radius:10px;background:${s.shipmentStatus==='in_transit'?'#d4edda':s.shipmentStatus==='production'?'#fff3cd':'rgba(44,71,75,0.1)'};font-weight:600">${statusLabel}</span></div>
    <table>
      <tr><td>Supplier</td><td>${s.supplier}</td></tr>
      <tr><td>From</td><td>${s.origin.port||s.origin.city}, ${s.origin.country||''}</td></tr>
      <tr><td>To</td><td>${s.destination.port||s.destination.city}</td></tr>
      ${s.vesselName?'<tr><td>Vessel</td><td>🚢 '+s.vesselName+(s.vesselPosition?' <span style="color:var(--green)">● LIVE</span>':'')+'</td></tr>':''}
      ${s.trackingCode?'<tr><td>Container</td><td style="font-family:monospace;font-size:11px">'+s.trackingCode+'</td></tr>':''}
      <tr><td>ETD</td><td>${etdDisplay}</td></tr>
      <tr><td>ETA</td><td>${etaDisplay}</td></tr>
      ${origEtaDisplay?'<tr><td>Orig. ETA</td><td style="color:var(--dim)">'+origEtaDisplay+(s.etaStatus==='delayed'?' → <span style="color:var(--red)">delayed</span>':s.etaStatus==='early'?' → <span style="color:var(--green)">early</span>':'')+'</td></tr>':''}
      <tr><td>Units</td><td><b>${s.totalUnits}</b> across ${s.skuCount} SKUs</td></tr>
      <tr><td>Value</td><td><b>$${s.total.toLocaleString()}</b> ${s.currency}</td></tr>
      ${s.progress>0&&s.progress<1?'<tr><td>Progress</td><td><div style="background:var(--border);border-radius:3px;height:6px;margin-top:2px"><div style="width:'+Math.round(s.progress*100)+'%;height:100%;background:var(--green);border-radius:3px"></div></div><span style="font-size:10px;color:var(--dim)">'+Math.round(s.progress*100)+'%</span></td></tr>':''}
    </table>
    <table class="dp-sku-table"><tr><th>SKU</th><th style="text-align:right">Qty</th></tr>${skuRows}</table>`;
  document.getElementById('detailPanel').style.display='block';
}

function closeDetail(){
  document.getElementById('detailPanel').style.display='none';
  selectedRef=null;
  renderSidebar();
}

function selectShipment(ref){
  if(selectedRef===ref){closeDetail();return}
  selectedRef=ref;
  renderSidebar();
  const s=shipments.find(x=>x.reference===ref);
  if(s){
    showDetail(s);
    let pos;
    if(s.vesselPosition && s.vesselPosition.lat){
      let aisLng=s.vesselPosition.lng;
      if(s.destination&&s.destination.lng<-100&&aisLng<0) aisLng+=360;
      pos=[s.vesselPosition.lat,aisLng];
    }else if(s.shipmentStatus==='arrived'){
      let dLng=s.destination.lng;
      if(dLng<-100) dLng+=360;
      pos=[s.destination.lat,dLng];
    }else if(s.progress>0&&s.progress<1){
      const routePoints=getRoutePoints(s.origin,s.destination);
      pos=getPointAlongRoute(routePoints,s.progress);
    }else{
      pos=[s.origin.lat,s.origin.lng];
    }
    map.flyTo(pos,4,{duration:0.8});
  }
}

// === NOTIFICATIONS ===
let notifications=[];
let notifOpen=false;

function generateNotifications(){
  notifications=[];
  const now=new Date();
  shipments.forEach(s=>{
    if(s.shipmentStatus==='arrived') return;

    // ETA changed — delayed or early
    if(s.etaStatus==='delayed'&&s.originalEta&&s.revisedEta){
      const diffDays=Math.round((new Date(s.revisedEta)-new Date(s.originalEta))/(24*60*60*1000));
      notifications.push({type:'delay',ref:s.reference,text:`${s.reference} delayed by ${diffDays} day${diffDays!==1?'s':''} (was ${new Date(s.originalEta).toLocaleDateString('en-AU',{day:'numeric',month:'short'})} → now ${new Date(s.revisedEta).toLocaleDateString('en-AU',{day:'numeric',month:'short'})})`,days:-diffDays,icon:'🔴'});
    }
    if(s.etaStatus==='early'&&s.originalEta&&s.revisedEta){
      const diffDays=Math.round((new Date(s.originalEta)-new Date(s.revisedEta))/(24*60*60*1000));
      notifications.push({type:'early',ref:s.reference,text:`${s.reference} arriving ${diffDays} day${diffDays!==1?'s':''} early (was ${new Date(s.originalEta).toLocaleDateString('en-AU',{day:'numeric',month:'short'})} → now ${new Date(s.revisedEta).toLocaleDateString('en-AU',{day:'numeric',month:'short'})})`,days:diffDays,icon:'🟢'});
    }

    if(!s.eta) return;
    const eta=new Date(s.eta);
    const daysLeft=Math.ceil((eta-now)/(24*60*60*1000));
    // Overdue — past ETA but not received
    if(daysLeft<0&&!s.receivedDate){
      notifications.push({type:'delay',ref:s.reference,text:`${s.reference} is overdue by ${Math.abs(daysLeft)} days (ETA was ${eta.toLocaleDateString('en-AU',{day:'numeric',month:'short'})})`,days:daysLeft,icon:'🔴'});
    }
    // Arriving within 7 days
    else if(daysLeft>=0&&daysLeft<=7){
      notifications.push({type:daysLeft<=3?'arriving':'arriving',ref:s.reference,text:`${s.reference} arriving in ${daysLeft} day${daysLeft!==1?'s':''} (${eta.toLocaleDateString('en-AU',{day:'numeric',month:'short'})})`,days:daysLeft,icon:daysLeft<=3?'🟠':'🟡'});
    }
  });
  // Sort: delays first, then soonest
  notifications.sort((a,b)=>{
    if(a.type==='delay'&&b.type!=='delay') return -1;
    if(a.type!=='delay'&&b.type==='delay') return 1;
    return a.days-b.days;
  });
  updateNotifBadge();
}

function updateNotifBadge(){
  const badge=document.getElementById('notifBadge');
  const urgent=notifications.filter(n=>n.type==='delay'||n.days<=3).length;
  if(urgent>0){badge.textContent=urgent;badge.style.display='flex'}
  else{badge.style.display='none'}
}

function toggleNotifs(){
  notifOpen=!notifOpen;
  const panel=document.getElementById('notifPanel');
  if(notifOpen){
    const list=document.getElementById('notifList');
    if(notifications.length===0){
      list.innerHTML='<div style="padding:20px;text-align:center;color:var(--dim);font-size:12px">No alerts — all shipments on track ✅</div>';
    }else{
      list.innerHTML=notifications.map(n=>`<div class="notif-item ${n.type}" onclick="selectShipment('${n.ref}');toggleNotifs()"><span class="ni-icon">${n.icon}</span>${n.text}</div>`).join('');
    }
    panel.style.display='block';
  }else{
    panel.style.display='none';
  }
}

// Close notifs on outside click
document.addEventListener('click',e=>{
  if(notifOpen&&!e.target.closest('#notifPanel')&&!e.target.closest('#notifBell')){
    notifOpen=false;document.getElementById('notifPanel').style.display='none';
  }
});

loadShipments();
// Refresh every 5 min
setInterval(loadShipments,5*60*1000);
</script>
