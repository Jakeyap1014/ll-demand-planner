services:
  - type: web
    name: ll-demand-planner
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: CIN7_USER
        sync: false
      - key: CIN7_KEY
        sync: false
      - key: SHOPIFY_TOKEN
        sync: false
      - key: SHOPIFY_STORE
        value: lifelystore.myshopify.com
      - key: DISCORD_WEBHOOK
        sync: false
      - key: GEMINI_API_KEY
        sync: false
